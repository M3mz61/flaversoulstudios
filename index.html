<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flave R Soul Studios</title>
    <style>
        body {
            background-color: #ffffff !important;
            color: #000000 !important;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .branding-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            text-decoration: none;
            color: #000000;
        }

        .showcase-disc {
            width: 280px;
            height: 280px;
            background-image: url("Studio/studio.jpeg");
            background-size: 116% 116%;
            background-repeat: no-repeat;
            background-position: center center;
            border-radius: 50%;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            transition: transform 0.3s ease;
        }

        .branding-container:hover .showcase-disc {
            transform: scale(1.02);
        }

        .studio-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 2.2rem;
            color: #000000;
            margin: 0 0 30px 0;
            letter-spacing: 0.5px;
        }

        /* Premium Button Container & Styling */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 240px;
        }

        .premium-btn {
            display: block;
            text-align: center;
            text-decoration: none;
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: #ffffff;
            background-color: #000000;
            padding: 14px 20px;
            border: 1px solid #000000;
            border-radius: 0; /* Sharp luxurious look, change to 4px if you want a slight curve */
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .premium-btn:hover {
            background-color: #ffffff;
            color: #000000;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <div class="branding-container">
        <div class="showcase-disc"></div>
        <h1 class="studio-title">Flave R Soul Studios</h1>
        
        <div class="button-group">
            <a href="booking.html" class="premium-btn">Studio Hire</a>
            <a href="mastering.html" class="premium-btn">Mastering</a>
        </div>
    </div>

</body>
</html>
