<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flaversoul Studios</title>
    <style>
        body {
            background-color: #ffffff !important;
            color: #000000 !important;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .branding-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .showcase-disc {
            width: 280px;
            height: 280px;
            background-image: url("https://flaversoulrecords.com");
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center center;
            border-radius: 50%;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        .studio-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 2.2rem;
            color: #000000;
            margin: 0 0 15px 0;
            letter-spacing: 0.5px;
        }

        .studio-subtitle {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", Georgia, serif;
            font-style: italic;
            font-size: 1.15rem;
            color: #555555;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="branding-container">
        <!-- Consistent Centered Logo Asset -->
        <div class="showcase-disc"></div>

        <!-- Uniform Typography Layout -->
        <h1 class="studio-title">Flaversoul Studios</h1>
        <p class="studio-subtitle">“Studio Hire & Producer Booking”</p>
    </div>

</body>
</html>
