<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flave R Soul Studios</title>
    <style>
        body {
            background-color: #ffffff !important;
            color: #000000 !important;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .branding-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 340px; /* Aligns with standard mobile box sizing */
            box-sizing: border-box;
        }

        .showcase-disc {
            width: 280px;
            height: 280px;
            background-image: url("Studio/studio.jpeg");
            background-size: 116% 116%;
            background-repeat: no-repeat;
            background-position: center center;
            border-radius: 50%;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            transition: transform 0.3s ease;
        }

        .branding-container:hover .showcase-disc {
            transform: scale(1.02);
        }

        .studio-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 2.2rem;
            color: #000000;
            margin: 0 0 35px 0;
            letter-spacing: 0.5px;
        }

        /* Button Group Container */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        /* Matched directly to the minimalist button style in your screenshot */
        .premium-btn {
            display: block;
            text-align: center;
            text-decoration: none;
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-size: 1.05rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #000000;
            background-color: transparent;
            padding: 16px 20px;
            border: 1px solid #000000;
            border-radius: 0; /* Sharp premium edges */
            transition: all 0.25s ease;
            box-sizing: border-box;
        }

        .premium-btn:hover {
            background-color: #000000;
            color: #ffffff;
        }

        /* Elegant wide-spaced gray brand footer from reference */
        .brand-footer {
            margin-top: 60px;
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #aaaaaa;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="branding-container">
        <!-- Opal vinyl display asset -->
        <div class="showcase-disc"></div>
        
        <!-- Main title heading -->
        <h1 class="studio-title">Flave R Soul Studios</h1>
        
        <!-- Clean, hollow button navigation array -->
        <div class="button-group">
            <a href="booking.html" class="premium-btn">Studio Hire</a>
            <a href="mastering.html" class="premium-btn">Mastering</a>
        </div>

        <!-- System signature footer -->
        <footer class="brand-footer">
            Flave R Soul Records &copy; 2026
        </footer>
    </div>

</body>
</html>
