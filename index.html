<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flave R Soul Studios</title>
    <style>
        body {
            background-color: #ffffff !important;
            color: #000000 !important;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .branding-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            text-decoration: none;
            color: #000000;
        }

        .showcase-disc {
            width: 250px; /* Reduced container size slightly from 280px */
            height: 250px;
            background-image: url("Studio/studio.jpeg");
            /* Adjusted size and position properties to shrink/center the graphic inside the circle border */
            background-size: 92% 92%; 
            background-repeat: no-repeat;
            background-position: center center;
            border-radius: 50%;
            margin-bottom: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .branding-container:hover .showcase-disc {
            transform: scale(1.02);
        }

        .studio-title {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 2.1rem;
            color: #000000;
            margin: 0 0 12px 0;
            letter-spacing: 0.5px;
        }

        .studio-subtitle {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", Georgia, serif;
            font-style: italic;
            font-size: 1.15rem;
            color: #555555;
            margin: 0;
            transition: color 0.3s ease;
        }

        .branding-container:hover .studio-subtitle {
            color: #000000;
        }
    </style>
</head>
<body>

    <a href="booking.html" class="branding-container">
        <!-- Mask dimensions adjusted slightly inward -->
        <div class="showcase-disc"></div>

        <!-- Target Brand Alignment -->
        <h1 class="studio-title">Flave R Soul Studios</h1>
        <p class="studio-subtitle">“Studio Hire & Producer Booking”</p>
    </a>

</body>
</html>
