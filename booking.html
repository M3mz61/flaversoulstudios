<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Hire — Flave R Soul Studios</title>
    <style>
        body {
            background-color: #ffffff !important;
            color: #000000 !important;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .showcase-disc {
            width: 280px;
            height: 280px;
            background-image: url("Studio/studio.jpeg");
            background-size: 116% 116%;
            background-repeat: no-repeat;
            background-position: center center;
            border-radius: 50%;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            transform: translateZ(0);
            will-change: transform;
        }

        .layout-divider {
            width: 100%;
            max-width: 600px;
            border: none;
            border-top: 1px solid #000000;
            margin: 0 0 30px 0;
        }

        .price-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
        }
        .price-row:last-child {
            margin-bottom: 0;
        }
        .price-item {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1.25rem;
            color: #000000;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .price-value {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-size: 1.25rem;
            font-weight: bold;
            color: #000000;
        }

        .tracklist-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }
        .track-entry {
            display: flex;
            flex-direction: column;
            padding: 22px 20px;
            border: 1px solid #000000;
            border-radius: 4px;
            background-color: #ffffff;
            text-decoration: none;
            color: #000000;
            transition: all 0.3s ease;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            transform: translateZ(0);
            will-change: transform;
        }
        .track-entry:hover {
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transform: translateY(-2px) translateZ(0);
        }
        .track-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 15px;
        }
        .track-name {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1.5rem;
            color: #000000;
            letter-spacing: 0.5px;
        }
        .track-version {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.8rem;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .navigation-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 600px;
            margin-top: 10px;
        }
        .foyer-button {
            font-family: "Bodoni 72", "Bodoni MT", "Didot", serif;
            font-weight: bold;
            font-size: 1rem;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            padding: 12px 0;
            width: 150px;
            border: 1px solid #000000;
            border-radius: 2px;
            background: transparent;
            transition: all 0.3s ease;
            cursor: pointer;
            text-align: center;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        .foyer-button:hover {
            background-color: #000000;
            color: #ffffff;
            letter-spacing: 4px;
        }

        @media (max-width: 600px) {
            body {
                padding: 40px 15px;
            }
            .showcase-disc {
                width: 260px;
                height: 260px;
                margin-bottom: 30px;
            }
            .track-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }
            .track-name {
                font-size: 1.3rem;
            }
            .track-version {
                font-size: 0.75rem;
                margin-top: 2px;
            }
        }
    </style>
</head>
<body>

    <div class="showcase-disc"></div>

    <hr class="layout-divider">

    <div class="price-container">
        <div class="price-row">
            <span class="price-item">Day Lockout (8 Hours)</span>
            <span class="price-value">£375</span>
        </div>
        <div class="price-row" style="margin-top: 20px;">
            <span class="price-item">Project Arrangement Submission</span>
            <span class="price-value">By Invitation Only</span>
        </div>
    </div>

    <hr class="layout-divider">

    <div class="tracklist-container">
        <a href="guitar.html" class="track-entry">
            <div class="track-header">
                <span class="track-name">Guitars</span>
                <span class="track-version">View &rarr;</span>
            </div>
        </a>

        <a href="midi.html" class="track-entry">
            <div class="track-header">
                <span class="track-name">MIDI</span>
                <span class="track-version">View &rarr;</span>
            </div>
        </a>

        <a href="equipment.html" class="track-entry">
            <div class="track-header">
                <span class="track-name">Mics, Amps & Monitors</span>
                <span class="track-version">View &rarr;</span>
            </div>
        </a>

        <a href="analogue.html" class="track-entry">
            <div class="track-header">
                <span class="track-name">FX and DSP</span>
                <span class="track-version">View &rarr;</span>
            </div>
        </a>

        <a href="architecture.html" class="track-entry">
            <div class="track-header">
                <span class="track-name">Mac Pro and Plugins</span>
                <span class="track-version">View &rarr;</span>
            </div>
        </a>
        
        <a href="mailto:memz@://flaversoulrecords.com" class="track-entry">
            <div class="track-header">
                <span class="track-name">Contact</span>
                <span class="track-version">Email &rarr;</span>
            </div>
        </a>
    </div>

    <hr class="layout-divider">

    <div class="navigation-group">
        <a href="index.html" class="foyer-button">Foyer</a>
        <a href="booking.html" class="foyer-button">Studio</a>
    </div>

</body>
</html>
